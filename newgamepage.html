<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Trivia Game</title>
    <link rel="stylesheet" href="designgame.css">
  </head>
  <body>
    <img id="gameBg" class="newgamebg" src="wallpapers/pic2.jpg" alt="Trivia Background">

    <button id="backToCategoriesBtn" class="back-arrow-btn" title="Back to Categories">
      &#8592; Back
    </button>

    <button id="gameMuteBtn" class="menu-mute-btn">🔊</button>

    <button class="button3" id="button3" style="display: none;">X</button>

    <div id="difficultySelector" class="difficulty-selector" style="text-align: center; background-color: rgba(0,0,0,0.85); padding: 30px; border: 2px solid gold; border-radius: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; width: 90%; max-width: 400px;">
      <h2 style="color: white; font-family: 'Roboto Slab', serif; margin-bottom: 20px;">READY TO PLAY?</h2>
      
      <div style="margin-bottom: 15px;">
        <input type="text" id="usernameInput" placeholder="Enter Username..." maxlength="20" style="padding: 12px 15px; font-size: 1.1em; font-family: 'Roboto Slab', serif; border: 2px solid gold; border-radius: 8px; background: rgba(0, 0, 0, 0.7); color: white; text-align: center; width: 100%; box-sizing: border-box; outline: none;">
      </div>

      <div id="usernameFeedback" style="color: #ff4d4d; font-family: 'Roboto Slab', serif; font-size: 0.95em; min-height: 20px; margin-bottom: 15px; font-weight: bold; text-shadow: 1px 1px 2px black; display: none;"></div>

      <button class="button1" id="startQuizBtn" style="position: relative; top: auto; left: auto; transform: none; width: 100%;">START GAME</button>
    </div>

    <div id="endGameScreen" style="display: none; text-align: center; background-color: rgba(0,0,0,0.85); padding: 30px; border: 2px solid gold; border-radius: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; width: 90%; max-width: 400px; box-shadow: 0px 0px 20px rgba(255, 215, 0, 0.4);">
      <h1 id="endGameTitle" style="color: white; font-family: 'Roboto Slab', serif; font-size: 2.2em; margin-bottom: 10px;">QUIZ COMPLETE!</h1>
      <p id="endUsername" style="color: white; font-family: 'Roboto Slab', serif; font-size: 1.1em; margin-bottom: 15px; text-transform: uppercase;"></p>
      
      <div style="background-color: rgba(255,255,255,0.08); border: 1px solid rgba(255,215,0,0.3); border-radius: 8px; padding: 15px; margin-bottom: 25px;">
        <p style="color: #aaa; font-family: 'Roboto Slab', serif; font-size: 0.9em; margin-bottom: 5px;">YOUR FINAL SCORE</p>
        <p id="endScoreDisplay" style="color: gold; font-family: 'Roboto Slab', serif; font-size: 3em; font-weight: bold; margin: 0;">0</p>
      </div>

      <button id="endMenuBtn" class="button1" style="position: relative; top: auto; left: auto; transform: none; width: 100%;">MAIN MENU</button>
    </div>

    <div id="difficultyWave" class="difficulty-wave">
      <h1 id="waveTitle">DIFFICULTY INCREASED!</h1>
      <p id="waveMessage">Get ready for the next level!</p>
    </div>

    <div id="quizContainer" class="quiz-container">
      <div class="quiz-topbar">
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="level-display">Difficulty: <span id="difficultyName">Easy</span></div>
      </div>

      <h3 style="margin-bottom: 10px;">Question <span id="questionNumber">1</span>/30</h3>
      <div class="question-text" id="question">Press start to load your first question.</div>

      <div class="timer-box-container">
        <div class="timer-badge">
          <span class="timer-icon">⏱️</span>
          <span class="timer-seconds" id="timerSeconds">7s</span>
        </div>
        <div class="timer-bar-container">
          <div id="timerBar" class="timer-bar"></div>
        </div>
      </div>

      <div id="optionsContainer" class="options-grid"></div>

      <button class="button1" id="nextQuestionBtn" type="button" style="position: relative; top: auto; left: auto; transform: none; width: 100%; margin-top: 15px;" disabled>NEXT</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://liprvperqmbjufgugoeh.supabase.co";
      const SUPABASE_KEY = "sb_publishable_v_AXFLAraDZ1J41Z53XdnA_p40vhmC7";
      
      const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

      function decodeHtmlEntities(text) {
        const textArea = document.createElement("textarea");
        textArea.innerHTML = text;
        return textArea.value;
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      let currentUsername = "";
      let questions = [];
      let currentQuestionIndex = 0;
      let score = 0;
      let answeredCurrentQuestion = false;

      // Timer variables
      const QUESTION_TIME_LIMIT = 7;
      let timerInterval = null;
      let timeRemaining = QUESTION_TIME_LIMIT;

      function getCategoryTableName(cat) {
        if (cat === 'movies') return 'trivia_scores_movies';
        if (cat === 'gk') return 'trivia_scores_gk';
        return 'trivia_scores_sports';
      }

      function setupCategoryBackground() {
        const urlParams = new URLSearchParams(window.location.search);
        const selectedCat = urlParams.get('category') || 'sports';
        const gameBg = document.getElementById("gameBg");

        if (!gameBg) return;

        if (selectedCat === 'movies') {
          gameBg.src = "wallpapers/pic1.jpg";
        } else if (selectedCat === 'gk') {
          gameBg.src = "wallpapers/pic3.jpg";
        } else {
          gameBg.src = "wallpapers/pic2.jpg";
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        setupCategoryBackground();

        const backBtn = document.getElementById("backToCategoriesBtn");
        if (backBtn) {
          backBtn.addEventListener("click", function () {
            stopTimer();
            window.location.href = "categories.html";
          });
        }

        document.getElementById("startQuizBtn").addEventListener("click", startQuiz);
        document.getElementById("nextQuestionBtn").addEventListener("click", nextQuestion);
        
        document.getElementById("endMenuBtn").addEventListener("click", function() {
            window.location.href = "index.html";
        });
      });

      async function startQuiz() {
        const inputField = document.getElementById("usernameInput");
        const feedbackField = document.getElementById("usernameFeedback");
        let enteredName = inputField ? inputField.value.trim() : "";
        
        if (feedbackField) {
          feedbackField.style.display = "none";
          feedbackField.textContent = "";
        }

        if (!enteredName) {
          if (feedbackField) {
            feedbackField.textContent = "Please enter a username to start playing!";
            feedbackField.style.display = "block";
          }
          return;
        }

        enteredName = enteredName.substring(0, 20); 

        const startBtn = document.getElementById("startQuizBtn");
        startBtn.disabled = true;
        startBtn.textContent = "CHECKING...";

        const urlParams = new URLSearchParams(window.location.search);
        const selectedCat = urlParams.get('category') || 'sports';
        const targetTable = getCategoryTableName(selectedCat);

        if (supabaseClient) {
          try {
            const { data: existingUser, error } = await supabaseClient
              .from(targetTable)
              .select('username')
              .ilike('username', enteredName) 
              .limit(1);

            if (!error && existingUser && existingUser.length > 0) {
              if (feedbackField) {
                feedbackField.textContent = `Username "${enteredName}" is taken in ${selectedCat.toUpperCase()}!`;
                feedbackField.style.display = "block";
              }
              startBtn.disabled = false;
              startBtn.textContent = "START GAME";
              return; 
            }
          } catch (dbError) {
            console.error("Database availability check failed:", dbError);
          }
        }

        currentUsername = enteredName;
        startBtn.textContent = "LOADING...";

        let categoryId = 21; // Sports
        if (selectedCat === 'movies') {
          categoryId = 11;   // Movies
        } else if (selectedCat === 'gk') {
          categoryId = 9;    // General Knowledge
        }

        const quizUrl = `https://opentdb.com/api.php?amount=30&category=${categoryId}&type=multiple`;

        try {
          const response = await fetch(quizUrl);
          const data = await response.json();

          if (data.results && data.results.length > 0) {
            questions = data.results.map((q, index) => {
              const correctAnswer = decodeHtmlEntities(q.correct_answer);
              const incorrectAnswers = q.incorrect_answers.map(item => decodeHtmlEntities(item));
              const options = shuffleArray([...incorrectAnswers, correctAnswer]);

              let pts = 1;
              let diffLabel = "Easy";
              if (index >= 10 && index < 20) {
                pts = 2;
                diffLabel = "Medium";
              } else if (index >= 20) {
                pts = 3;
                diffLabel = "Hard";
              }

              return {
                difficulty: diffLabel,
                difficulty_points: pts,
                question: decodeHtmlEntities(q.question),
                options: options,
                answer: correctAnswer
              };
            });
          }
        } catch (fetchError) {
          console.error("Quiz retrieval error:", fetchError);
        }

        if (questions.length === 0) {
          if (feedbackField) {
            feedbackField.textContent = "Network error. Please try again.";
            feedbackField.style.display = "block";
          }
          startBtn.disabled = false;
          startBtn.textContent = "START GAME";
          return;
        }

        currentQuestionIndex = 0;
        score = 0;
        answeredCurrentQuestion = false;

        document.getElementById("score").textContent = score;
        document.getElementById("difficultySelector").style.display = "none";
        document.getElementById("quizContainer").style.display = "block";
        displayQuestion();
      }

      function startTimer() {
        stopTimer();
        timeRemaining = QUESTION_TIME_LIMIT;
        
        const timerText = document.getElementById("timerSeconds");
        const timerBar = document.getElementById("timerBar");
        
        if (timerText) timerText.textContent = `${timeRemaining}s`;
        if (timerBar) {
          timerBar.style.width = "100%";
          timerBar.classList.remove("warning");
        }

        const intervalStep = 100;
        let currentStep = 0;

        timerInterval = setInterval(() => {
          currentStep++;
          const remainingMs = (QUESTION_TIME_LIMIT * 1000) - (currentStep * intervalStep);
          timeRemaining = Math.max(0, Math.ceil(remainingMs / 1000));

          if (timerText) timerText.textContent = `${timeRemaining}s`;
          
          if (timerBar) {
            const percentage = Math.max(0, (remainingMs / (QUESTION_TIME_LIMIT * 1000)) * 100);
            timerBar.style.width = `${percentage}%`;

            if (timeRemaining <= 3) {
              timerBar.classList.add("warning");
            }
          }

          if (remainingMs <= 0) {
            stopTimer();
            handleTimeOutNext();
          }
        }, intervalStep);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function handleTimeOutNext() {
        if (answeredCurrentQuestion) return;
        answeredCurrentQuestion = true;

        const currentQ = questions[currentQuestionIndex];
        const optionButtons = document.querySelectorAll(".option");

        // Highlight the correct answer in green briefly so user sees it
        optionButtons.forEach(button => {
          button.disabled = true;
          if (button.dataset.answer === currentQ.answer) {
            button.classList.add("correct");
          }
        });

        // Automatically send user to next question after 1 second delay
        setTimeout(() => {
          nextQuestion();
        }, 1000);
      }

      function displayQuestion() {
        const question = questions[currentQuestionIndex];
        const optionLabels = ["A", "B", "C", "D"];

        answeredCurrentQuestion = false;
        document.getElementById("nextQuestionBtn").disabled = true;
        document.getElementById("question").textContent = question.question;
        document.getElementById("questionNumber").textContent = currentQuestionIndex + 1;
        
        let customDifficultyLabel = "Easy";
        if (currentQuestionIndex >= 10 && currentQuestionIndex < 20) {
          customDifficultyLabel = "Medium";
        } else if (currentQuestionIndex >= 20) {
          customDifficultyLabel = "Hard";
        }
        document.getElementById("difficultyName").textContent = customDifficultyLabel;

        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";

        question.options.forEach(function (option, index) {
          const label = optionLabels[index];
          const btn = document.createElement("button");

          btn.type = "button";
          btn.className = `option ${label}`;
          btn.dataset.answer = option;
          btn.innerHTML = `<span class="option-letter">${label}</span><span>${option}</span>`;
          btn.addEventListener("click", function () {
            selectAnswer(option, question.answer, btn);
          });
          optionsContainer.appendChild(btn);
        });

        startTimer();
      }

      function selectAnswer(selected, correct, element) {
        if (answeredCurrentQuestion) return;
        answeredCurrentQuestion = true;

        stopTimer();

        const optionButtons = document.querySelectorAll(".option");
        optionButtons.forEach(function (button) {
          button.disabled = true;
          if (button.dataset.answer === correct) {
            button.classList.add("correct");
          }
        });

        if (selected === correct) {
          score += questions[currentQuestionIndex].difficulty_points;
          element.classList.add("correct");
        } else {
          element.classList.add("wrong");
        }

        document.getElementById("score").textContent = score;
        document.getElementById("nextQuestionBtn").disabled = false;
      }

      function nextQuestion() {
        stopTimer();
        document.getElementById("nextQuestionBtn").disabled = true;
        currentQuestionIndex++;

        if (currentQuestionIndex >= questions.length) {
          endQuiz();
          return;
        }

        if (currentQuestionIndex === 10) {
          showDifficultyWave("MEDIUM", "Difficulty Increased to MEDIUM!");
          setTimeout(displayQuestion, 2000);
        } else if (currentQuestionIndex === 20) {
          showDifficultyWave("HARD", "Difficulty Increased to HARD!");
          setTimeout(displayQuestion, 2000);
        } else {
          displayQuestion();
        }
      }

      function showDifficultyWave(difficulty, message) {
        stopTimer();
        const wave = document.getElementById("difficultyWave");
        document.getElementById("waveTitle").textContent = difficulty;
        document.getElementById("waveMessage").textContent = message;
        wave.style.display = "block";

        setTimeout(function () {
          wave.style.display = "none";
        }, 2000);
      }

      function endQuiz() {
        stopTimer();
        const urlParams = new URLSearchParams(window.location.search);
        const selectedCat = urlParams.get('category') || 'sports';

        saveScore(currentUsername, score, selectedCat);

        document.getElementById("quizContainer").style.display = "none";
        document.getElementById("endGameTitle").textContent = "QUIZ COMPLETE! 🎉";
        document.getElementById("endGameTitle").style.color = "white";
        document.getElementById("endUsername").textContent = `Player: ${currentUsername}`;
        document.getElementById("endScoreDisplay").textContent = score;
        document.getElementById("endGameScreen").style.display = "block";
      }

      async function saveScore(username, finalScore, categoryName) {
        const targetTable = getCategoryTableName(categoryName);

        if (supabaseClient) {
          try {
            await supabaseClient
              .from(targetTable)
              .insert([
                { 
                  username: username || "Anonymous", 
                  score: Number(finalScore) || 0
                }
              ]);
          } catch (error) {
            console.error("Database save error:", error);
          }
        }

        try {
          const storedScores = localStorage.getItem("trivia_scores");
          let scores = storedScores ? JSON.parse(storedScores) : [];
          if (!Array.isArray(scores)) scores = [];

          scores.push({ 
            username: username || "Anonymous", 
            score: Number(finalScore) || 0,
            category: categoryName || "sports"
          });
          scores.sort((a, b) => b.score - a.score);
          localStorage.setItem("trivia_scores", JSON.stringify(scores.slice(0, 100)));
        } catch (error) {
          console.error("LocalStorage save fault:", error);
        }
      }

      const gameMuteBtn = document.getElementById("gameMuteBtn");

      function triggerGlobalMusic() {
          if (window.parent && window.parent.postMessage) {
              window.parent.postMessage("play_music", "*");
          }
      }
      document.addEventListener("click", triggerGlobalMusic);

      gameMuteBtn.addEventListener("click", function(e) {
          e.stopPropagation(); 
          if (window.parent && window.parent.postMessage) {
              window.parent.postMessage("toggle_music", "*");
          }
      });

      window.addEventListener("message", function(event) {
          if (event.data && event.data.type === "audio_status") {
              gameMuteBtn.textContent = event.data.muted ? "🔇" : "🔊";
              gameMuteBtn.style.borderColor = event.data.muted ? "gray" : "gold";
              gameMuteBtn.style.color = event.data.muted ? "gray" : "gold";
          }
      });
    </script>
  </body>
</html>
