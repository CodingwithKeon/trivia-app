<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
    <title>The Trivia Game</title>
    <link rel="stylesheet" href="designgame.css">
  </head>
  <body>
    <img id="gameBg" class="newgamebg" src="wallpapers/sportstheme.jpg" alt="Trivia Background">

    <button id="gameMuteBtn" style="position: fixed; bottom: 20px; right: 20px; z-index: 10; background: rgba(0,0,0,0.6); color: gold; border: 2px solid gold; border-radius: 50%; width: 50px; height: 50px; font-size: 1.5em; cursor: pointer; font-family: 'Roboto Slab', serif; display: flex; align-items: center; justify-content: center; outline: none; transition: 0.3s;">🔊</button>

    <button class="button3" id="button3">← BACK</button>

    <div id="difficultySelector" class="difficulty-selector" style="text-align: center; background-color: rgba(0,0,0,0.85); padding: 30px; border: 2px solid gold; border-radius: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; min-width: 340px;">
      <h2 style="color: white; font-family: 'Roboto Slab', serif; margin-bottom: 20px;">CHOOSE GAME MODE</h2>
      
      <div style="margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
        <button id="modeSoloBtn" type="button" style="padding: 10px 18px; background: gold; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; font-family: 'Roboto Slab', serif; transition: 0.2s;">SOLO</button>
        <button id="modeVersusBtn" type="button" style="padding: 10px 18px; background: rgba(255,255,255,0.2); color: white; border: 1px solid gold; font-weight: bold; cursor: pointer; border-radius: 6px; font-family: 'Roboto Slab', serif; transition: 0.2s;">2-PLAYER VERSUS</button>
      </div>

      <div id="p1InputGroup" style="margin-bottom: 15px;">
        <label id="p1Label" style="color: gold; font-family: 'Roboto Slab', serif; display: block; margin-bottom: 5px; text-align: left; padding-left: 8%;">Player 1 Name:</label>
        <input type="text" id="usernameInput" placeholder="Enter Player 1 Name..." maxlength="20" style="padding: 12px 15px; font-size: 1.1em; font-family: 'Roboto Slab', serif; border: 2px solid gold; border-radius: 8px; background: rgba(0, 0, 0, 0.7); color: white; text-align: center; width: 85%; box-sizing: border-box; outline: none;">
      </div>

      <div id="p2InputGroup" style="margin-bottom: 15px; display: none;">
        <label style="color: #00e5ff; font-family: 'Roboto Slab', serif; display: block; margin-bottom: 5px; text-align: left; padding-left: 8%;">Player 2 Name:</label>
        <input type="text" id="usernameInput2" placeholder="Enter Player 2 Name..." maxlength="20" style="padding: 12px 15px; font-size: 1.1em; font-family: 'Roboto Slab', serif; border: 2px solid #00e5ff; border-radius: 8px; background: rgba(0, 0, 0, 0.7); color: white; text-align: center; width: 85%; box-sizing: border-box; outline: none;">
      </div>

      <div id="usernameFeedback" style="color: #ff4d4d; font-family: 'Roboto Slab', serif; font-size: 0.95em; min-height: 20px; margin-bottom: 15px; font-weight: bold; text-shadow: 1px 1px 2px black; display: none;"></div>

      <button class="difficulty-btn" id="startQuizBtn" style="padding: 10px 25px; font-family: 'Roboto Slab', serif; font-size: 1.2em; font-weight: bold; background-color: white; color: black; border: 2px solid gold; border-radius: 8px; cursor: pointer; transition: 0.3s;">START GAME</button>
    </div>

    <div id="endGameScreen" style="display: none; text-align: center; background-color: rgba(0,0,0,0.85); padding: 40px; border: 2px solid gold; border-radius: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; min-width: 350px; box-shadow: 0px 0px 20px rgba(255, 215, 0, 0.4);">
      <h1 id="endTitle" style="color: white; font-family: 'Roboto Slab', serif; font-size: 2.3em; margin-bottom: 10px; text-shadow: 2px 2px 4px black;">QUIZ COMPLETE!</h1>
      <p id="endUsername" style="color: white; font-family: 'Roboto Slab', serif; font-size: 1.3em; margin-bottom: 20px; text-transform: uppercase;"></p>
      
      <div id="endScoreBox" style="background-color: rgba(255,255,255,0.08); border: 1px solid rgba(255,215,0,0.3); border-radius: 8px; padding: 20px; margin-bottom: 30px;">
        <p style="color: #aaa; font-family: 'Roboto Slab', serif; font-size: 1em; margin-bottom: 5px;">YOUR FINAL SCORE</p>
        <p id="endScoreDisplay" style="color: gold; font-family: 'Roboto Slab', serif; font-size: 3.5em; font-weight: bold; margin: 0; text-shadow: 2px 2px 5px black;">0</p>
      </div>

      <button id="endMenuBtn" style="padding: 12px 35px; font-family: 'Roboto Slab', serif; font-size: 1.2em; font-weight: bold; background-color: white; color: black; border: 2px solid gold; border-radius: 8px; cursor: pointer; transition: 0.3s; box-shadow: 2px 2px 5px rgba(0,0,0,0.4);">MAIN MENU</button>
    </div>

    <div id="difficultyWave" class="difficulty-wave">
      <h1 id="waveTitle">DIFFICULTY INCREASED!</h1>
      <p id="waveMessage">Get ready for the next level!</p>
    </div>

    <div id="quizContainer" class="quiz-container">
      <div id="turnBanner" style="display: none; background: rgba(0, 0, 0, 0.7); border: 1px solid gold; padding: 8px 15px; border-radius: 8px; margin-bottom: 12px; color: white; font-family: 'Roboto Slab', serif; text-align: center;">
        <span id="p1Display" style="color: gold; font-weight: bold;">P1: 0</span>
        <span style="margin: 0 12px; color: #666;">|</span>
        <span id="turnIndicator" style="font-size: 1.05em; font-weight: bold; color: white;">TURN: PLAYER 1</span>
        <span style="margin: 0 12px; color: #666;">|</span>
        <span id="p2Display" style="color: #00e5ff; font-weight: bold;">P2: 0</span>
      </div>

      <div id="powerupsContainer" style="display: flex; justify-content: center; gap: 10px; margin-bottom: 15px;">
        <button id="powerup5050" class="powerup-btn" style="padding: 6px 14px; background: rgba(0,0,0,0.7); color: gold; border: 1px solid gold; border-radius: 6px; cursor: pointer; font-family: 'Roboto Slab', serif; font-size: 0.85em; transition: 0.2s;">
          🌓 50/50 (1x)
        </button>
        <button id="powerupTime" class="powerup-btn" style="padding: 6px 14px; background: rgba(0,0,0,0.7); color: gold; border: 1px solid gold; border-radius: 6px; cursor: pointer; font-family: 'Roboto Slab', serif; font-size: 0.85em; transition: 0.2s;">
          ⏳ +10s (1x)
        </button>
        <button id="powerupSkip" class="powerup-btn" style="padding: 6px 14px; background: rgba(0,0,0,0.7); color: gold; border: 1px solid gold; border-radius: 6px; cursor: pointer; font-family: 'Roboto Slab', serif; font-size: 0.85em; transition: 0.2s;">
          ⏭️ Skip (1x)
        </button>
      </div>

      <div class="quiz-topbar">
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="level-display">Difficulty: <span id="difficultyName">Easy</span></div>
      </div>

      <div id="timerContainer" style="text-align: center; margin-bottom: 10px;">
        <span style="font-family: 'Roboto Slab', serif; font-size: 1.3em; font-weight: bold; color: gold; text-shadow: 2px 2px 4px black; background: rgba(0,0,0,0.5); padding: 6px 18px; border: 1px solid gold; border-radius: 20px; display: inline-block;">
          ⏳ Time Left: <span id="timerDisplay" style="color: white;">10</span>s
        </span>
      </div>

      <h3>Question <span id="questionNumber">1</span>/30</h3>
      <div class="question-text" id="question">Press start to load your first question.</div>
      <div id="optionsContainer" class="options-grid"></div>

      <button class="difficulty-btn next-btn" id="nextQuestionBtn" type="button" disabled>NEXT</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://liprvperqmbjufgugoeh.supabase.co";
      const SUPABASE_KEY = "sb_publishable_v_AXFLAraDZ1J41Z53XdnA_p40vhmC7";
      
      const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

      function decodeHtmlEntities(text) {
        const textArea = document.createElement("textarea");
        textArea.innerHTML = text;
        return textArea.value;
      }

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      // Game Mode & Player Variables
      let isVersusMode = false;
      let activePlayer = 1;
      let p1Score = 0;
      let p2Score = 0;
      let p1Name = "";
      let p2Name = "";

      let currentUsername = "";
      let questions = [];
      let currentQuestionIndex = 0;
      let score = 0;
      let answeredCurrentQuestion = false;

      // Power-up Tracking
      let used5050 = false;
      let usedExtraTime = false;
      let usedSkip = false;

      // Timer variables
      let timerInterval = null;
      let timeLeft = 10;

      function getCategoryTableName(cat) {
        if (cat === 'movies') return 'trivia_scores_movies';
        if (cat === 'gk') return 'trivia_scores_gk';
        return 'trivia_scores_sports';
      }

      function setupCategoryBackground() {
        const urlParams = new URLSearchParams(window.location.search);
        const selectedCat = urlParams.get('category') || 'sports';
        const gameBg = document.getElementById("gameBg");

        if (!gameBg) return;

        if (selectedCat === 'movies') {
          gameBg.src = "wallpapers/movietheme_upscayl_5x_high-fidelity-4x.jpg";
        } else if (selectedCat === 'gk') {
          gameBg.src = "wallpapers/genk.jpg";
        } else {
          gameBg.src = "wallpapers/sportstheme_upscayl_5x_high-fidelity-4x.jpg"; 
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        setupCategoryBackground();

        // Mode Toggles
        const soloBtn = document.getElementById("modeSoloBtn");
        const versusBtn = document.getElementById("modeVersusBtn");

        soloBtn.addEventListener("click", function() {
          isVersusMode = false;
          soloBtn.style.background = "gold";
          soloBtn.style.color = "black";
          versusBtn.style.background = "rgba(255,255,255,0.2)";
          versusBtn.style.color = "white";
          document.getElementById("p2InputGroup").style.display = "none";
          document.getElementById("p1Label").textContent = "Username:";
        });

        versusBtn.addEventListener("click", function() {
          isVersusMode = true;
          versusBtn.style.background = "#00e5ff";
          versusBtn.style.color = "black";
          soloBtn.style.background = "rgba(255,255,255,0.2)";
          soloBtn.style.color = "white";
          document.getElementById("p2InputGroup").style.display = "block";
          document.getElementById("p1Label").textContent = "Player 1 Name:";
        });

        document.getElementById("startQuizBtn").addEventListener("click", startQuiz);
        document.getElementById("nextQuestionBtn").addEventListener("click", function() {
          stopTimer();
          nextQuestion();
        });
        
        document.getElementById("endMenuBtn").addEventListener("click", function() {
            window.location.href = "index.html";
        });

        const backBtn = document.getElementById("button3");
        if (backBtn) {
            backBtn.addEventListener("click", function() {
                window.location.href = "categories.html";
            });
        }
      });

      // Power-Up Functions
      function use5050() {
        if (used5050 || answeredCurrentQuestion) return;
        
        const currentQ = questions[currentQuestionIndex];
        const optionButtons = Array.from(document.querySelectorAll(".option"));
        const wrongButtons = optionButtons.filter(btn => btn.dataset.answer !== currentQ.answer);
        
        shuffleArray(wrongButtons);
        if (wrongButtons[0]) wrongButtons[0].style.visibility = "hidden";
        if (wrongButtons[1]) wrongButtons[1].style.visibility = "hidden";
        
        used5050 = true;
        const btn = document.getElementById("powerup5050");
        btn.disabled = true;
        btn.style.opacity = "0.4";
        btn.style.cursor = "not-allowed";
      }

      function useExtraTime() {
        if (usedExtraTime || answeredCurrentQuestion) return;
        
        timeLeft += 10;
        const timerDisplay = document.getElementById("timerDisplay");
        if (timerDisplay) {
          timerDisplay.textContent = timeLeft;
          if (timeLeft > 3) {
            timerDisplay.style.color = "white";
          }
        }
        
        usedExtraTime = true;
        const btn = document.getElementById("powerupTime");
        btn.disabled = true;
        btn.style.opacity = "0.4";
        btn.style.cursor = "not-allowed";
      }

      function useSkip() {
        if (usedSkip || answeredCurrentQuestion) return;
        
        usedSkip = true;
        const btn = document.getElementById("powerupSkip");
        btn.disabled = true;
        btn.style.opacity = "0.4";
        btn.style.cursor = "not-allowed";
        
        stopTimer();
        nextQuestion();
      }

      function updateVersusBanner() {
        const banner = document.getElementById("turnBanner");
        if (!isVersusMode) {
          banner.style.display = "none";
          return;
        }

        banner.style.display = "block";
        document.getElementById("p1Display").textContent = `${p1Name}: ${p1Score}`;
        document.getElementById("p2Display").textContent = `${p2Name}: ${p2Score}`;
        
        const turnText = document.getElementById("turnIndicator");
        if (activePlayer === 1) {
          turnText.textContent = `TURN: ${p1Name.toUpperCase()}`;
          turnText.style.color = "gold";
        } else {
          turnText.textContent = `TURN: ${p2Name.toUpperCase()}`;
          turnText.style.color = "#00e5ff";
        }
      }

      async function startQuiz() {
        const inputField = document.getElementById("usernameInput");
        const inputField2 = document.getElementById("usernameInput2");
        const feedbackField = document.getElementById("usernameFeedback");
        
        p1Name = inputField ? inputField.value.trim().substring(0, 20) : "";
        p2Name = isVersusMode && inputField2 ? inputField2.value.trim().substring(0, 20) : "";
        
        if (feedbackField) {
          feedbackField.style.display = "none";
          feedbackField.textContent = "";
        }

        if (!p1Name) {
          if (feedbackField) {
            feedbackField.textContent = "Please enter a username for Player 1!";
            feedbackField.style.display = "block";
          }
          return;
        }

        if (isVersusMode && !p2Name) {
          if (feedbackField) {
            feedbackField.textContent = "Please enter a username for Player 2!";
            feedbackField.style.display = "block";
          }
          return;
        }

        const startBtn = document.getElementById("startQuizBtn");
        startBtn.disabled = true;
        startBtn.textContent = "CHECKING AVAILABILITY...";

        const urlParams = new URLSearchParams(window.location.search);
        const selectedCat = urlParams.get('category') || 'sports';
        const targetTable = getCategoryTableName(selectedCat);

        if (supabaseClient) {
          try {
            const { data: existingUser } = await supabaseClient
              .from(targetTable)
              .select('username')
              .ilike('username', p1Name) 
              .limit(1);

            if (existingUser && existingUser.length > 0) {
              if (feedbackField) {
                feedbackField.textContent = `Username "${p1Name}" is taken in ${selectedCat.toUpperCase()}!`;
                feedbackField.style.display = "block";
              }
              startBtn.disabled = false;
              startBtn.textContent = "START GAME";
              return; 
            }
          } catch (dbError) {
            console.error("Database availability check failed:", dbError);
          }
        }

        currentUsername = p1Name;
        startBtn.textContent = "LOADING...";

        let categoryId = 21; // Sports
        if (selectedCat === 'movies') {
          categoryId = 11;   // Movies
        } else if (selectedCat === 'gk') {
          categoryId = 9;    // General Knowledge
        }

        const quizUrl = `https://opentdb.com/api.php?amount=30&category=${categoryId}&type=multiple`;

        try {
          const response = await fetch(quizUrl);
          const data = await response.json();

          if (data.results && data.results.length > 0) {
            questions = data.results.map((q, index) => {
              const correctAnswer = decodeHtmlEntities(q.correct_answer);
              const incorrectAnswers = q.incorrect_answers.map(item => decodeHtmlEntities(item));
              const options = shuffleArray([...incorrectAnswers, correctAnswer]);

              let pts = 1;
              let diffLabel = "Easy";
              if (index >= 10 && index < 20) {
                pts = 2;
                diffLabel = "Medium";
              } else if (index >= 20) {
                pts = 3;
                diffLabel = "Hard";
              }

              return {
                difficulty: diffLabel,
                difficulty_points: pts,
                question: decodeHtmlEntities(q.question),
                options: options,
                answer: correctAnswer
              };
            });
          }
        } catch (fetchError) {
          console.error("Quiz retrieval error:", fetchError);
        }

        if (questions.length === 0) {
          if (feedbackField) {
            feedbackField.textContent = "Network error. Please wait a second and click start again.";
            feedbackField.style.display = "block";
          }
          startBtn.disabled = false;
          startBtn.textContent = "START GAME";
          return;
        }

        currentQuestionIndex = 0;
        score = 0;
        p1Score = 0;
        p2Score = 0;
        activePlayer = 1;
        answeredCurrentQuestion = false;

        // Reset power-ups
        used5050 = false;
        usedExtraTime = false;
        usedSkip = false;

        const btn5050 = document.getElementById("powerup5050");
        const btnTime = document.getElementById("powerupTime");
        const btnSkip = document.getElementById("powerupSkip");

        [btn5050, btnTime, btnSkip].forEach(btn => {
          if (btn) {
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
          }
        });

        if (btn5050) btn5050.onclick = use5050;
        if (btnTime) btnTime.onclick = useExtraTime;
        if (btnSkip) btnSkip.onclick = useSkip;

        document.getElementById("score").textContent = score;
        document.getElementById("difficultySelector").style.display = "none";
        document.getElementById("quizContainer").style.display = "block";
        
        updateVersusBanner();
        displayQuestion();
      }

      function startTimer() {
        stopTimer();
        timeLeft = 10;
        const timerDisplay = document.getElementById("timerDisplay");
        if (timerDisplay) {
          timerDisplay.textContent = timeLeft;
          timerDisplay.style.color = "white";
        }

        timerInterval = setInterval(() => {
          timeLeft--;
          if (timerDisplay) {
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 3) {
              timerDisplay.style.color = "#ff4d4d";
            }
          }

          if (timeLeft <= 0) {
            stopTimer();
            handleTimeout();
          }
        }, 1000);
      }

      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }

      function handleTimeout() {
        if (answeredCurrentQuestion) return;
        answeredCurrentQuestion = true;

        const currentQ = questions[currentQuestionIndex];
        const optionButtons = document.querySelectorAll(".option");

        optionButtons.forEach(function (button) {
          button.disabled = true;
          if (button.dataset.answer === currentQ.answer) {
            button.classList.add("correct");
          }
        });

        document.getElementById("nextQuestionBtn").disabled = false;

        setTimeout(() => {
          nextQuestion();
        }, 1000);
      }

      function displayQuestion() {
        const question = questions[currentQuestionIndex];
        const optionLabels = ["A", "B", "C", "D"];

        answeredCurrentQuestion = false;
        document.getElementById("nextQuestionBtn").disabled = true;
        document.getElementById("question").textContent = question.question;
        document.getElementById("questionNumber").textContent = currentQuestionIndex + 1;
        
        let customDifficultyLabel = "Easy";
        if (currentQuestionIndex >= 10 && currentQuestionIndex < 20) {
          customDifficultyLabel = "Medium";
        } else if (currentQuestionIndex >= 20) {
          customDifficultyLabel = "Hard";
        }
        document.getElementById("difficultyName").textContent = customDifficultyLabel;

        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";

        question.options.forEach(function (option, index) {
          const label = optionLabels[index];
          const btn = document.createElement("button");

          btn.type = "button";
          btn.className = `option ${label}`;
          btn.dataset.answer = option;
          btn.innerHTML = `<span class="option-letter">${label}</span><span>${option}</span>`;
          btn.addEventListener("click", function () {
            selectAnswer(option, question.answer, btn);
          });
          optionsContainer.appendChild(btn);
        });

        updateVersusBanner();
        startTimer();
      }

      function selectAnswer(selected, correct, element) {
        if (answeredCurrentQuestion) return;
        answeredCurrentQuestion = true;

        stopTimer();

        const optionButtons = document.querySelectorAll(".option");
        optionButtons.forEach(function (button) {
          button.disabled = true;
          if (button.dataset.answer === correct) {
            button.classList.add("correct");
          }
        });

        if (selected === correct) {
          const pts = questions[currentQuestionIndex].difficulty_points;
          element.classList.add("correct");
          
          if (isVersusMode) {
            if (activePlayer === 1) {
              p1Score += pts;
            } else {
              p2Score += pts;
            }
          } else {
            score += pts;
          }
        } else {
          element.classList.add("wrong");
        }

        document.getElementById("score").textContent = isVersusMode ? (activePlayer === 1 ? p1Score : p2Score) : score;
        updateVersusBanner();
        document.getElementById("nextQuestionBtn").disabled = false;
      }

      function nextQuestion() {
        stopTimer();
        document.getElementById("nextQuestionBtn").disabled = true;
        
        if (isVersusMode) {
          activePlayer = activePlayer === 1 ? 2 : 1;
        }

        currentQuestionIndex++;

        if (currentQuestionIndex >= questions.length) {
          endQuiz();
          return;
        }

        if (currentQuestionIndex === 10) {
          showDifficultyWave("MEDIUM", "Difficulty Increased to MEDIUM!");
          setTimeout(displayQuestion, 2000);
        } else if (currentQuestionIndex === 20) {
          showDifficultyWave("HARD", "Difficulty Increased to HARD!");
          setTimeout(displayQuestion, 2000);
        } else {
          displayQuestion();
        }
      }

      function showDifficultyWave(difficulty, message) {
        stopTimer();
        const wave = document.getElementById("difficultyWave");
        document.getElementById("waveTitle").textContent = difficulty;
        document.getElementById("waveMessage").textContent = message;
        wave.style.display = "block";

        setTimeout(function () {
          wave.style.display = "none";
        }, 2000);
      }

      function endQuiz() {
        stopTimer();
        const urlParams = new URLSearchParams(window.location.search);
        const selectedCat = urlParams.get('category') || 'sports';

        document.getElementById("quizContainer").style.display = "none";

        if (isVersusMode) {
          let winnerText = "IT'S A TIE!";
          if (p1Score > p2Score) {
            winnerText = `🏆 ${p1Name.toUpperCase()} WINS!`;
          } else if (p2Score > p1Score) {
            winnerText = `🏆 ${p2Name.toUpperCase()} WINS!`;
          }

          document.getElementById("endTitle").textContent = winnerText;
          document.getElementById("endUsername").textContent = `${p1Name}: ${p1Score} | ${p2Name}: ${p2Score}`;
          document.getElementById("endScoreDisplay").textContent = Math.max(p1Score, p2Score);

          saveScore(p1Name, p1Score, selectedCat);
          saveScore(p2Name, p2Score, selectedCat);
        } else {
          document.getElementById("endTitle").textContent = "QUIZ COMPLETE!";
          document.getElementById("endUsername").textContent = `Player: ${currentUsername}`;
          document.getElementById("endScoreDisplay").textContent = score;
          saveScore(currentUsername, score, selectedCat);
        }

        document.getElementById("endGameScreen").style.display = "block";
      }

      async function saveScore(username, finalScore, categoryName) {
        const targetTable = getCategoryTableName(categoryName);
        let scoreSavedToCloud = false;

        const uploadTimeout = setTimeout(() => {
          if (!scoreSavedToCloud) {
             console.warn("Cloud score broadcast timed out.");
          }
        }, 5000);

        if (supabaseClient) {
          try {
            const { error } = await supabaseClient
              .from(targetTable)
              .insert([
                { 
                  username: username || "Anonymous", 
                  score: Number(finalScore) || 0
                }
              ]);
            if (!error) {
               scoreSavedToCloud = true;
               clearTimeout(uploadTimeout);
               console.log(`Saved score into ${targetTable}`);
            }
          } catch (error) {
            console.error("Database connection fault handled:", error);
            clearTimeout(uploadTimeout);
          }
        } else {
           clearTimeout(uploadTimeout);
        }

        try {
          const storedScores = localStorage.getItem("trivia_scores");
          let scores = storedScores ? JSON.parse(storedScores) : [];
          if (!Array.isArray(scores)) scores = [];

          scores.push({ 
            username: username || "Anonymous", 
            score: Number(finalScore) || 0,
            category: categoryName || "sports"
          });
          scores.sort((a, b) => b.score - a.score);
          localStorage.setItem("trivia_scores", JSON.stringify(scores.slice(0, 100)));
        } catch (error) {
          console.error("LocalStorage save fault:", error);
        }
      }

      const gameMuteBtn = document.getElementById("gameMuteBtn");

      function triggerGlobalMusic() {
          if (window.parent && window.parent.postMessage) {
              window.parent.postMessage("play_music", "*");
          }
      }
      document.addEventListener("click", triggerGlobalMusic);

      gameMuteBtn.addEventListener("click", function(e) {
          e.stopPropagation(); 
          if (window.parent && window.parent.postMessage) {
              window.parent.postMessage("toggle_music", "*");
          }
      });

      window.addEventListener("message", function(event) {
          if (event.data && event.data.type === "audio_status") {
              gameMuteBtn.textContent = event.data.muted ? "🔇" : "🔊";
              gameMuteBtn.style.borderColor = event.data.muted ? "gray" : "gold";
              gameMuteBtn.style.color = event.data.muted ? "gray" : "gold";
          }
      });
    </script>
  </body>
</html>
