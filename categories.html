<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Category - The Trivia Game</title>
    <link rel="stylesheet" href="designgame.css">
    <style>
      .categories-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        background-color: rgba(0, 0, 0, 0.8);
        border: 2px solid gold;
        border-radius: 12px;
        padding: 35px 30px;
        width: 90%;
        max-width: 700px;
        text-align: center;
        box-shadow: 0px 0px 25px rgba(255, 215, 0, 0.35);
      }

      .categories-title {
        color: white;
        font-family: "Roboto Slab", serif;
        font-size: 2.2em;
        margin-bottom: 25px;
        text-shadow: 2px 2px 4px black;
        letter-spacing: 1px;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }

      .category-card {
        background-color: rgba(255, 255, 255, 0.08);
        border: 2px solid gold;
        border-radius: 10px;
        padding: 25px 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .category-card:hover {
        background-color: gold;
        transform: translateY(-5px);
        box-shadow: 0px 10px 20px rgba(255, 215, 0, 0.4);
      }

      .category-card:hover .category-name,
      .category-card:hover .category-desc {
        color: black;
      }

      .category-emoji {
        font-size: 3.5em;
        margin-bottom: 12px;
      }

      .category-name {
        color: white;
        font-family: "Roboto Slab", serif;
        font-size: 1.3em;
        font-weight: bold;
        margin-bottom: 6px;
        transition: color 0.3s ease;
      }

      .category-desc {
        color: #ccc;
        font-family: "Roboto Slab", serif;
        font-size: 0.85em;
        transition: color 0.3s ease;
      }

      .back-btn-container {
        display: flex;
        justify-content: center;
      }

      @media (max-width: 768px) {
        .categories-container {
          width: 92%;
          padding: 20px 15px;
          max-height: 85vh;
          overflow-y: auto;
        }

        .categories-title {
          font-size: 1.6em;
          margin-bottom: 18px;
        }

        .category-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .category-card {
          padding: 15px 10px;
        }

        .category-emoji {
          font-size: 2.5em;
          margin-bottom: 6px;
        }
      }
    </style>
  </head>
  <body>
    <img class="newgamebg" src="wallpapers/pic10.jpg" alt="Background">

    <button id="categoryMuteBtn" class="menu-mute-btn">🔊</button>

    <div class="categories-container">
      <h1 class="categories-title">CHOOSE A CATEGORY</h1>

      <div class="category-grid">
        <div class="category-card" data-category="sports">
          <div class="category-emoji">⚽</div>
          <div class="category-name">SPORTS</div>
          <div class="category-desc">Test your athletic trivia</div>
        </div>

        <div class="category-card" data-category="movies">
          <div class="category-emoji">🎬</div>
          <div class="category-name">MOVIES</div>
          <div class="category-desc">Films & Pop Culture</div>
        </div>

        <div class="category-card" data-category="gk">
          <div class="category-emoji">🧠</div>
          <div class="category-name">GENERAL</div>
          <div class="category-desc">Knowledge across topics</div>
        </div>
      </div>

      <div class="back-btn-container">
        <button id="backToMenuBtn" class="button1" style="position: relative; top: auto; left: auto; transform: none;">MAIN MENU</button>
      </div>
    </div>

    <script>
      document.querySelectorAll(".category-card").forEach(card => {
        card.addEventListener("click", function() {
          const selectedCategory = this.getAttribute("data-category");
          window.location.href = `newgamepage.html?category=${selectedCategory}`;
        });
      });

      const backBtn = document.getElementById("backToMenuBtn");
      if (backBtn) {
        backBtn.addEventListener("click", function() {
          window.location.href = "index.html";
        });
      }

      const categoryMuteBtn = document.getElementById("categoryMuteBtn");

      function triggerGlobalMusic() {
        if (window.parent && window.parent.postMessage) {
          window.parent.postMessage("play_music", "*");
        }
      }
      document.addEventListener("click", triggerGlobalMusic);

      if (categoryMuteBtn) {
        categoryMuteBtn.addEventListener("click", function(e) {
          e.stopPropagation(); 
          if (window.parent && window.parent.postMessage) {
            window.parent.postMessage("toggle_music", "*");
          }
        });
      }

      window.addEventListener("message", function(event) {
        if (event.data && event.data.type === "audio_status" && categoryMuteBtn) {
          categoryMuteBtn.textContent = event.data.muted ? "🔇" : "🔊";
          categoryMuteBtn.style.borderColor = event.data.muted ? "gray" : "gold";
          categoryMuteBtn.style.color = event.data.muted ? "gray" : "gold";
        }
      });
    </script>
  </body>
</html>
