<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Category - The Trivia Game</title>
    <link rel="stylesheet" href="designgame.css">
    <style>
      .categories-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        background-color: rgba(0, 0, 0, 0.8);
        border: 2px solid gold;
        border-radius: 12px;
        padding: 35px 30px;
        width: 90%;
        max-width: 700px;
        text-align: center;
        box-shadow: 0px 0px 25px rgba(255, 215, 0, 0.35);
      }

      .categories-title {
        color: white;
        font-family: "Roboto Slab", serif;
        font-size: 2.2em;
        margin-bottom: 25px;
        text-shadow: 2px 2px 4px black;
        letter-spacing: 1px;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }

      @media (max-width: 650px) {
        .category-grid {
          grid-template-columns: 1fr;
        }
      }

      .category-card {
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid gold;
        border-radius: 12px;
        padding: 25px 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }

      .category-card:hover {
        background-color: rgba(68, 216, 68, 0.85);
        border-color: white;
        transform: translateY(-6px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
      }

      .category-emoji {
        font-size: 3.5em;
        margin-bottom: 12px;
        filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.6));
      }

      .category-name {
        color: white;
        font-family: "Roboto Slab", serif;
        font-size: 1.2em;
        font-weight: bold;
        text-shadow: 1px 1px 3px black;
      }

      .category-card:hover .category-name {
        color: white;
      }

    .back-menu-btn {
       background: rgba(255, 255, 255, 0.08);
        border: 2px solid gold;
        border-radius: 12px;
        padding: 25px 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: white;
    }

    .back-menu-btn:hover {
       background-color: rgba(68, 216, 68, 0.85);
        border-color: white;
        transform: translateY(-6px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
    }
    </style>
  </head>
  <body>
    <img class="newgamebg" src="wallpapers/pic10.jpg" alt="Background">

    <button id="categoryMuteBtn" class="menu-mute-btn">🔊</button>
    <button class="button3" id="button3">X</button>

    <div class="categories-container">
      <h1 class="categories-title">CHOOSE A CATEGORY</h1>

      <div class="category-grid">
        <div class="category-card" data-category="sports">
          <div class="category-emoji">⚽</div>
          <div class="category-name">SPORTS</div>
        </div>

        <div class="category-card" data-category="movies">
          <div class="category-emoji">🎬</div>
          <div class="category-name">MOVIES</div>
        </div>

        <div class="category-card" data-category="gk">
          <div class="category-emoji">🧠</div>
          <div class="category-name">GENERAL KNOWLEDGE</div>
        </div>
      </div>

      <button id="backToMenuBtn" class="back-menu-btn">MAIN MENU</button>
    </div>

    <script src="menu.js"></script>
    <script>
      // Category card click handlers
      document.querySelectorAll(".category-card").forEach(card => {
        card.addEventListener("click", function() {
          const selectedCategory = this.getAttribute("data-category");
          // Navigates to game page with selected category in URL
          window.location.href = `newgamepage.html?category=${selectedCategory}`;
        });
      });

      const backBtn = document.getElementById("backToMenuBtn");
      if (backBtn) {
        backBtn.addEventListener("click", function() {
          window.location.href = "index.html";
        });
      }

      // Sound System Compatibility
      const categoryMuteBtn = document.getElementById("categoryMuteBtn");

      function triggerGlobalMusic() {
        if (window.parent && window.parent.postMessage) {
          window.parent.postMessage("play_music", "*");
        }
      }
      document.addEventListener("click", triggerGlobalMusic);

      if (categoryMuteBtn) {
        categoryMuteBtn.addEventListener("click", function(e) {
          e.stopPropagation(); 
          if (window.parent && window.parent.postMessage) {
            window.parent.postMessage("toggle_music", "*");
          }
        });
      }

      window.addEventListener("message", function(event) {
        if (event.data && event.data.type === "audio_status" && categoryMuteBtn) {
          categoryMuteBtn.textContent = event.data.muted ? "🔇" : "🔊";
          categoryMuteBtn.style.borderColor = event.data.muted ? "gray" : "gold";
          categoryMuteBtn.style.color = event.data.muted ? "gray" : "gold";
        }
      });
    </script>
  </body>
</html>
