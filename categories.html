<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
    <title>Select Category - The Trivia Game</title>
    <link rel="stylesheet" href="designgame.css">
    <style>
      .categories-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        background-color: rgba(0, 0, 0, 0.85);
        border: 2px solid gold;
        border-radius: 12px;
        padding: 30px;
        width: 90%;
        max-width: 720px;
        text-align: center;
        box-shadow: 0px 0px 25px rgba(255, 215, 0, 0.35);
      }

      .categories-title {
        color: white;
        font-family: "Roboto Slab", serif;
        font-size: 2em;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px black;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        margin-bottom: 20px;
      }

      .category-card, .custom-mode-card {
        background-color: rgba(255, 255, 255, 0.08);
        border: 2px solid gold;
        border-radius: 10px;
        padding: 20px 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .madlibs-card {
        border-color: #00e5ff;
        background: rgba(0, 229, 255, 0.08);
      }

      .riddles-card {
        border-color: #e040fb;
        background: rgba(224, 64, 251, 0.08);
      }

      .category-card:hover {
        background-color: gold;
        transform: translateY(-4px);
        box-shadow: 0px 8px 15px rgba(255, 215, 0, 0.4);
      }

      .madlibs-card:hover {
        background-color: #00e5ff;
        transform: translateY(-4px);
        box-shadow: 0px 8px 15px rgba(0, 229, 255, 0.4);
      }

      .riddles-card:hover {
        background-color: #e040fb;
        transform: translateY(-4px);
        box-shadow: 0px 8px 15px rgba(224, 64, 251, 0.4);
      }

      .category-card:hover *, .custom-mode-card:hover * {
        color: black !important;
      }

      .category-emoji {
        font-size: 3em;
        margin-bottom: 8px;
      }

      .category-name {
        color: white;
        font-family: "Roboto Slab", serif;
        font-size: 1.2em;
        font-weight: bold;
        margin-bottom: 4px;
      }

      .category-desc {
        color: #ccc;
        font-family: "Roboto Slab", serif;
        font-size: 0.8em;
      }

      @media (max-width: 600px) {
        .category-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <img class="newgamebg" src="wallpapers/pic10_upscayl_5x_high-fidelity-4x.jpg" alt="Background">

    <button id="categoryMuteBtn" class="menu-mute-btn">🔊</button>

    <div class="categories-container">
      <h1 class="categories-title">CHOOSE A CATEGORY</h1>

      <div class="category-grid">
        <div class="category-card" data-category="sports">
          <div class="category-emoji">⚽</div>
          <div class="category-name">SPORTS</div>
          <div class="category-desc">Test your athletic trivia</div>
        </div>

        <div class="category-card" data-category="movies">
          <div class="category-emoji">🎬</div>
          <div class="category-name">MOVIES</div>
          <div class="category-desc">Films & Pop Culture</div>
        </div>

        <div class="category-card" data-category="gk">
          <div class="category-emoji">🧠</div>
          <div class="category-name">GENERAL</div>
          <div class="category-desc">Knowledge across topics</div>
        </div>

        <div class="custom-mode-card riddles-card" onclick="window.location.href='riddles.html'">
          <div class="category-emoji">📜</div>
          <div class="category-name" style="color: #e040fb;">RIDDLES</div>
          <div class="category-desc">Solve 15 mind-benders</div>
        </div>
      </div>

      <div class="custom-mode-card madlibs-card" onclick="window.location.href='madlibs.html'" style="margin-bottom: 20px;">
        <div class="category-emoji">🎭</div>
        <div class="category-name" style="color: #00e5ff;">MAD LIBS</div>
        <div class="category-desc">Create funny random stories!</div>
      </div>

      <button id="backToMenuBtn" class="button1" style="position: static; transform: none; width: 100%;">MAIN MENU</button>
    </div>

    <script>
      document.querySelectorAll(".category-card").forEach(card => {
        card.addEventListener("click", function() {
          const selectedCategory = this.getAttribute("data-category");
          window.location.href = `newgamepage.html?category=${selectedCategory}`;
        });
      });

      document.getElementById("backToMenuBtn").addEventListener("click", () => {
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
