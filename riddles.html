<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
    <title>Riddles - The Poets</title>
    <link rel="stylesheet" href="designgame.css">
    <style>
      .riddles-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        background-color: rgba(0, 0, 0, 0.9);
        border: 2px solid #e040fb;
        border-radius: 12px;
        padding: 30px;
        width: 90%;
        max-width: 680px;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0px 0px 30px rgba(224, 64, 251, 0.4);
        text-align: center;
        color: white;
        font-family: "Roboto Slab", serif;
      }

      .riddles-container h1 {
        color: #e040fb;
        font-size: 2.2em;
        margin-bottom: 5px;
        text-shadow: 2px 2px 4px black;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: gold;
        font-size: 1.1em;
        font-weight: bold;
        margin-bottom: 12px;
      }

      .lives-tracker {
        font-size: 1.2em;
        margin-bottom: 15px;
        letter-spacing: 2px;
      }

      .riddle-box {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(224, 64, 251, 0.3);
        border-radius: 8px;
        padding: 22px;
        margin-bottom: 15px;
        font-size: 1.25em;
        line-height: 1.5;
        min-height: 90px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Hint Section */
      .hint-controls {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-bottom: 15px;
      }

      .hint-btn {
        background: rgba(224, 64, 251, 0.15);
        color: #e040fb;
        border: 1px solid #e040fb;
        padding: 8px 14px;
        border-radius: 6px;
        font-family: "Roboto Slab", serif;
        font-size: 0.88em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      .hint-btn:hover:not(:disabled) {
        background: #e040fb;
        color: white;
        box-shadow: 0 0 10px rgba(224, 64, 251, 0.5);
      }

      .hint-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .hint-display-box {
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .word-hint-text {
        font-size: 1.3em;
        letter-spacing: 4px;
        color: gold;
        font-weight: bold;
        background: rgba(0, 0, 0, 0.6);
        padding: 8px 18px;
        border-radius: 6px;
        border: 1px dashed gold;
      }

      .picture-hint-emoji {
        font-size: 4em;
        background: rgba(224, 64, 251, 0.1);
        padding: 10px 25px;
        border-radius: 12px;
        border: 2px solid gold;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        display: inline-block;
      }

      /* Answer Input */
      .answer-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .riddle-input, .username-input {
        width: 100%;
        padding: 16px;
        font-family: "Roboto Slab", serif;
        font-size: 1.1em;
        background: rgba(0, 0, 0, 0.6);
        border: 2px solid #e040fb;
        border-radius: 8px;
        color: gold;
        text-align: center;
        outline: none;
        box-shadow: inset 0 0 10px rgba(224, 64, 251, 0.2);
        transition: 0.3s;
      }

      .riddle-input:focus, .username-input:focus {
        border-color: gold;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
      }

      .submit-btn {
        width: 100%;
        padding: 16px;
        font-family: "Roboto Slab", serif;
        font-size: 1.1em;
        font-weight: bold;
        background: linear-gradient(135deg, #e040fb, #aa00ff);
        color: white;
        border: 2px solid #e040fb;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
      }

      .submit-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 0 15px rgba(224, 64, 251, 0.6);
      }

      .feedback-msg {
        font-size: 1.1em;
        font-weight: bold;
        margin-top: 10px;
        min-height: 25px;
      }
    </style>
  </head>
  <body>
    <img class="imageappearance" src="wallpapers/riddlepage.jpg" alt="Riddles Background" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">

    <button class="button3" onclick="window.location.href='categories.html'" style="position: fixed; top: 20px; left: 20px; z-index: 10;">← BACK</button>

    <div class="riddles-container" id="gameBox">
      <h1>THE POETS 📜</h1>
      <p style="color: #ccc; margin: 15px 0 25px 0;">Enter your name to start the riddle challenge:</p>
      
      <form onsubmit="startGame(event)">
        <input type="text" id="usernameInput" class="username-input" placeholder="Enter your Poet Name..." maxlength="15" autocomplete="off" required>
        <button type="submit" class="submit-btn" style="margin-top: 20px;">START GAME 🖋️</button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://liprvperqmbjufgugoeh.supabase.co";
      const SUPABASE_KEY = "sb_publishable_v_AXFLAraDZ1J41Z53XdnA_p40vhmC7";
      const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

      let playerUsername = "Poet";
      let riddlesList = [];
      let currentIndex = 0;
      let score = 0;
      let livesLeft = 3;
      let wordHintUsed = false;
      let picHintUsed = false;

      // Dictionary to map common riddle answers to visual clue emojis
      const emojiClueMap = {
        "pants": "👖", "trousers": "👖",
        "coffin": "⚰️",
        "towel": "🧺 💧",
        "shadow": "👤 🌑",
        "coin": "🪙",
        "silence": "🤫 🤐",
        "umbrella": "☔ 🌧️",
        "fence": "🏡 🪵",
        "bottle": "🍾",
        "glove": "🧤",
        "telephone": "☎️ 📞",
        "age": "🎂 📈",
        "cold": "🤧 🧊",
        "comb": "🪮 💇",
        "donut": "🍩",
        "candle": "🕯️",
        "map": "🗺️",
        "clock": "⏰",
        "piano": "🎹",
        "bank": "🏦 💵",
        "mirror": "🪞",
        "sponge": "🧽 🧽"
      };

      const funShortRiddles = [
        { riddle: "I have two legs, but cannot walk. What am I?", answer: "pants", emojiHint: "👖" },
        { riddle: "The person who makes it, sells it. The person who buys it never uses it. What is it?", answer: "coffin", emojiHint: "⚰️" },
        { riddle: "What gets wetter the more it dries?", answer: "towel", emojiHint: "🧺 💧" },
        { riddle: "I follow you everywhere, but you can never catch me. What am I?", answer: "shadow", emojiHint: "👤 🌑" },
        { riddle: "What has a head and a tail, but no body?", answer: "coin", emojiHint: "🪙" },
        { riddle: "What breaks the second you say its name?", answer: "silence", emojiHint: "🤫 🤐" },
        { riddle: "What goes up when rain comes down?", answer: "umbrella", emojiHint: "☔ 🌧️" },
        { riddle: "What runs all around the yard without moving?", answer: "fence", emojiHint: "🏡 🪵" },
        { riddle: "What has a neck, but no head?", answer: "bottle", emojiHint: "🍾" },
        { riddle: "What has a thumb and four fingers, but isn't alive?", answer: "glove", emojiHint: "🧤" },
        { riddle: "I have a ring, but no fingers. What am I?", answer: "telephone", emojiHint: "☎️ 📞" },
        { riddle: "What goes up, but never comes back down?", answer: "age", emojiHint: "🎂 📈" },
        { riddle: "What can you catch, but never throw?", answer: "cold", emojiHint: "🤧 🧊" },
        { riddle: "What has many teeth, but cannot bite?", answer: "comb", emojiHint: "🪮 💇" },
        { riddle: "What has a hole in the middle and is delicious to eat?", answer: "donut", emojiHint: "🍩" }
      ];

      function countSentences(text) {
        return text.split(/[.!?]+/).filter(Boolean).length;
      }

      function startGame(e) {
        e.preventDefault();
        const inputVal = document.getElementById("usernameInput").value.trim();
        if (inputVal) {
          playerUsername = inputVal;
        }

        // Render main game interface
        const gameBox = document.getElementById("gameBox");
        gameBox.innerHTML = `
          <h1>THE POETS 📜</h1>
          <div class="status-bar">
            <span id="riddleRound">RIDDLE 1 / 15</span>
            <span id="scoreTracker">SCORE: 0</span>
          </div>

          <div class="lives-tracker" id="livesTracker">LIVES: ❤️❤️❤️</div>

          <div class="riddle-box" id="riddleText">Loading short riddles...</div>

          <div class="hint-controls">
            <button class="hint-btn" id="wordHintBtn" onclick="revealWordHint()">💡 WORD HINT</button>
            <button class="hint-btn" id="picHintBtn" onclick="revealPictureHint()">🖼️ PICTURE HINT</button>
          </div>

          <div class="hint-display-box" id="hintDisplayBox"></div>

          <form class="answer-form" id="answerForm" onsubmit="handleAnswer(event)">
            <input type="text" id="userAnswer" class="riddle-input" placeholder="Type your answer here..." autocomplete="off" required>
            <button type="submit" class="submit-btn" id="submitBtn">SUBMIT ANSWER ✒️</button>
          </form>

          <div class="feedback-msg" id="feedback"></div>
        `;

        fetchRiddles();
      }

      async function fetchRiddles() {
        try {
          const fetchedPromises = Array.from({ length: 20 }, () =>
            fetch("https://riddles-api.vercel.app/random").then(res => res.json())
          );
          
          const results = await Promise.allSettled(fetchedPromises);
          
          results.forEach(res => {
            if (res.status === "fulfilled" && res.value && res.value.riddle && res.value.answer) {
              const text = res.value.riddle.trim();
              if (countSentences(text) <= 2 && text.length <= 110) {
                const cleanAns = res.value.answer.toLowerCase().replace(/^(a|an|the)\s+/i, "").trim();
                const emoji = emojiClueMap[cleanAns] || "🔍 ❓";
                riddlesList.push({
                  riddle: text,
                  answer: cleanAns,
                  emojiHint: emoji
                });
              }
            }
          });
        } catch (e) {
          console.warn("API error, using fun fallback riddles:", e);
        }

        if (riddlesList.length < 15) {
          for (let fallback of funShortRiddles) {
            if (riddlesList.length >= 15) break;
            if (!riddlesList.some(r => r.riddle === fallback.riddle)) {
              riddlesList.push(fallback);
            }
          }
        }

        riddlesList = riddlesList.slice(0, 15).sort(() => Math.random() - 0.5);
        showNextRiddle();
      }

      function updateLivesDisplay() {
        let hearts = "";
        for (let i = 0; i < 3; i++) {
          hearts += i < livesLeft ? "❤️" : "🖤";
        }
        document.getElementById("livesTracker").textContent = `LIVES: ${hearts}`;
      }

      function showNextRiddle() {
        if (currentIndex >= 15) {
          finishGame();
          return;
        }

        livesLeft = 3;
        wordHintUsed = false;
        picHintUsed = false;

        document.getElementById("riddleRound").textContent = `RIDDLE ${currentIndex + 1} / 15`;
        document.getElementById("scoreTracker").textContent = `SCORE: ${score}`;
        updateLivesDisplay();

        document.getElementById("riddleText").textContent = riddlesList[currentIndex].riddle;
        document.getElementById("hintDisplayBox").innerHTML = "";

        const wordBtn = document.getElementById("wordHintBtn");
        const picBtn = document.getElementById("picHintBtn");
        wordBtn.disabled = false;
        picBtn.disabled = false;
        wordBtn.textContent = "💡 WORD HINT";
        picBtn.textContent = "🖼️ PICTURE HINT";

        document.getElementById("userAnswer").value = "";
        document.getElementById("userAnswer").disabled = false;
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("feedback").textContent = "";
        document.getElementById("userAnswer").focus();
      }

      function revealWordHint() {
        if (wordHintUsed) return;
        wordHintUsed = true;

        const wordBtn = document.getElementById("wordHintBtn");
        wordBtn.disabled = true;
        wordBtn.textContent = "💡 WORD HINT REVEALED";

        const answer = riddlesList[currentIndex].answer;
        let hintPattern = answer.charAt(0).toUpperCase();
        for (let i = 1; i < answer.length; i++) {
          hintPattern += answer[i] === " " ? "  " : " _";
        }

        const hintBox = document.getElementById("hintDisplayBox");
        let wordEl = document.getElementById("wordHintElement");
        if (!wordEl) {
          wordEl = document.createElement("div");
          wordEl.id = "wordHintElement";
          wordEl.className = "word-hint-text";
          hintBox.appendChild(wordEl);
        }
        wordEl.textContent = `HINT: ${hintPattern}`;
      }

      function revealPictureHint() {
        if (picHintUsed) return;
        picHintUsed = true;

        const picBtn = document.getElementById("picHintBtn");
        picBtn.disabled = true;
        picBtn.textContent = "🖼️ PICTURE HINT REVEALED";

        const emojiClue = riddlesList[currentIndex].emojiHint || "🔍 ❓";

        const hintBox = document.getElementById("hintDisplayBox");
        let picEl = document.getElementById("picHintElement");
        if (!picEl) {
          picEl = document.createElement("div");
          picEl.id = "picHintElement";
          picEl.className = "picture-hint-emoji";
          hintBox.appendChild(picEl);
        }
        picEl.textContent = emojiClue;
      }

      function handleAnswer(e) {
        e.preventDefault();
        
        const userInput = document.getElementById("userAnswer").value.trim().toLowerCase();
        if (!userInput) return;

        const rawCorrect = riddlesList[currentIndex].answer.toLowerCase();
        const cleanCorrect = rawCorrect.replace(/^(a|an|the)\s+/i, "").trim();
        const cleanUser = userInput.replace(/^(a|an|the)\s+/i, "").trim();

        const feedback = document.getElementById("feedback");

        if (cleanUser === cleanCorrect || (cleanCorrect.includes(cleanUser) && cleanUser.length >= 3)) {
          score += 100;
          feedback.style.color = "#00e5ff";
          feedback.textContent = "✨ CORRECT!";

          document.getElementById("userAnswer").disabled = true;
          document.getElementById("submitBtn").disabled = true;
          document.getElementById("wordHintBtn").disabled = true;
          document.getElementById("picHintBtn").disabled = true;

          currentIndex++;
          setTimeout(showNextRiddle, 1800);
        } else {
          livesLeft--;
          updateLivesDisplay();

          if (livesLeft > 0) {
            feedback.style.color = "#ff0055";
            feedback.textContent = `❌ WRONG! Try again. (${livesLeft} ${livesLeft === 1 ? 'life' : 'lives'} left)`;
            document.getElementById("userAnswer").value = "";
            document.getElementById("userAnswer").focus();
          } else {
            feedback.style.color = "#ff0055";
            feedback.textContent = `❌ OUT OF LIVES! Correct answer: ${riddlesList[currentIndex].answer.toUpperCase()}`;

            document.getElementById("userAnswer").disabled = true;
            document.getElementById("submitBtn").disabled = true;
            document.getElementById("wordHintBtn").disabled = true;
            document.getElementById("picHintBtn").disabled = true;

            currentIndex++;
            setTimeout(showNextRiddle, 2000);
          }
        }
      }

      async function finishGame() {
        const gameBox = document.getElementById("gameBox");
        gameBox.innerHTML = `
          <h1>THE POETS 📜</h1>
          <p style="font-size: 1.2em; color: white; margin-top: 10px;">POET: <strong style="color: gold;">${playerUsername}</strong></p>
          <p style="font-size: 1.5em; color: gold; margin: 15px 0;">FINAL SCORE: ${score} / 1500</p>

          <p style="color: #ccc; margin-bottom: 20px;">Saving your score to <strong>The Poets Leaderboard</strong>...</p>
          <button class="submit-btn" id="finishLeaderboardBtn" onclick="window.location.href='leaderboard.html?tab=poets'">VIEW LEADERBOARD 🏆</button>
        `;

        await savePoetScore();
      }

      async function savePoetScore() {
        const name = playerUsername || "Anonymous Poet";
        
        if (supabaseClient) {
          try {
            await supabaseClient.from('trivia_scores_poets').insert([{ username: name, score: score }]);
          } catch (e) {
            console.error("Supabase poets save fault:", e);
          }
        }

        try {
          let scores = JSON.parse(localStorage.getItem("poets_scores")) || [];
          if (!Array.isArray(scores)) scores = [];

          scores.push({ username: name, score: score });
          scores.sort((a, b) => b.score - a.score);
          localStorage.setItem("poets_scores", JSON.stringify(scores.slice(0, 100)));
        } catch (err) {
          console.error("Failed to save local score:", err);
        }
      }
    </script>
  </body>
</html>
