<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaderboard - The Trivia Game</title>
    <link rel="stylesheet" href="designgame.css">
    <style>
      .leaderboard-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        background-color: rgba(0, 0, 0, 0.85);
        border: 2px solid gold;
        border-radius: 12px;
        padding: 30px;
        width: 90%;
        max-width: 700px;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0px 0px 25px rgba(255, 215, 0, 0.35);
      }

      .leaderboard-container h1 {
        color: white;
        font-family: "Roboto Slab", serif;
        font-size: 2.2em;
        text-align: center;
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px black;
      }

      .category-tabs {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
      }

      .tab-btn {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 2px solid gold;
        border-radius: 8px;
        padding: 10px 18px;
        font-family: "Roboto Slab", serif;
        font-size: 0.95em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .tab-btn.active, .tab-btn:hover {
        background-color: gold;
        color: black;
      }

      .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 25px;
        font-family: "Roboto Slab", serif;
        color: white;
      }

      .leaderboard-table th, .leaderboard-table td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 215, 0, 0.2);
      }

      .leaderboard-table th {
        background-color: rgba(255, 215, 0, 0.15);
        color: gold;
      }

      .back-btn-container {
        display: flex;
        justify-content: center;
      }

      @media (max-width: 600px) {
        .leaderboard-container {
          width: 95%;
          padding: 18px 12px;
        }

        .leaderboard-container h1 {
          font-size: 1.5em;
        }

        .category-tabs {
          flex-wrap: wrap;
          gap: 6px;
        }

        .tab-btn {
          padding: 8px 10px;
          font-size: 0.8em;
          flex: 1 1 30%;
        }

        .leaderboard-table th, .leaderboard-table td {
          padding: 8px 6px;
          font-size: 0.85em;
        }
      }
    </style>
  </head>
  <body>
    <img class="newgamebg" src="wallpapers/pic9.jpg" alt="Background">

    <div class="leaderboard-container">
      <h1 id="leaderboardTitle">GLOBAL LEADERBOARD</h1>
      
      <div class="category-tabs">
        <button class="tab-btn active" data-category="sports">⚽ SPORTS</button>
        <button class="tab-btn" data-category="movies">🎬 MOVIES</button>
        <button class="tab-btn" data-category="gk">🧠 GENERAL</button>
      </div>

      <table class="leaderboard-table">
        <thead>
          <tr>
            <th style="width: 20%;">Rank</th>
            <th style="width: 55%;">Player Name</th>
            <th style="width: 25%;">High Score</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
          <tr>
            <td colspan="3" style="color: gray; font-style: italic; padding: 20px; text-align: center;">Loading Rankings...</td>
          </tr>
        </tbody>
      </table>

      <div class="back-btn-container">
        <button id="backToMenuBtn" class="button1" style="position: relative; top: auto; left: auto; transform: none;">MAIN MENU</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://liprvperqmbjufgugoeh.supabase.co";
      const SUPABASE_KEY = "sb_publishable_v_AXFLAraDZ1J41Z53XdnA_p40vhmC7";
      
      const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

      let currentCategory = "sports";

      function getCategoryTableName(cat) {
        if (cat === 'movies') return 'trivia_scores_movies';
        if (cat === 'gk') return 'trivia_scores_gk';
        return 'trivia_scores_sports';
      }

      document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll(".tab-btn").forEach(btn => {
          btn.addEventListener("click", function() {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
            currentCategory = this.getAttribute("data-category");
            
            fetchGlobalLeaderboard(currentCategory);
          });
        });

        fetchGlobalLeaderboard(currentCategory); 

        const backBtn = document.getElementById("backToMenuBtn");
        if (backBtn) {
            backBtn.addEventListener("click", function () {
                window.location.href = "index.html";
            });
        }
      });

      async function fetchGlobalLeaderboard(cat) {
        const tbody = document.getElementById("leaderboardBody");
        if (!tbody || !supabaseClient) return;

        const targetTable = getCategoryTableName(cat);

        try {
          const { data: scores, error } = await supabaseClient
            .from(targetTable)
            .select('username, score')
            .order('score', { ascending: false })
            .limit(50);

          if (error) throw error;

          document.getElementById("leaderboardTitle").textContent = "GLOBAL LEADERBOARD";
          tbody.innerHTML = ""; 

          if (scores && scores.length > 0) {
            scores.forEach((entry, index) => {
              const row = document.createElement("tr");
              const safeUsername = (entry.username || "Anonymous")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
              const safeScore = Number(entry.score) || 0;

              row.innerHTML = `
                <td><strong>#${index + 1}</strong></td>
                <td>${safeUsername}</td>
                <td style="color: gold; font-weight: bold;">${safeScore}</td>
              `;
              tbody.appendChild(row);
            });
          } else {
            tbody.innerHTML = `<tr><td colspan="3" style="color: #aaa; padding: 20px; text-align: center;">No scores registered for this category yet!</td></tr>`;
          }
        } catch (error) {
          console.error("Cloud database fetch error:", error);
          renderLocalFallback(cat);
        }
      }

      function renderLocalFallback(cat) {
          const tbody = document.getElementById("leaderboardBody");
          if (!tbody) return;

          document.getElementById("leaderboardTitle").textContent = "LOCAL LEADERBOARD (Offline)";

          let scores = [];
          try {
              const storedScores = localStorage.getItem("trivia_scores");
              if (storedScores) scores = JSON.parse(storedScores);
          } catch (e) {
              console.error(e);
          }

          if (!Array.isArray(scores)) scores = [];

          const categoryScores = scores.filter(entry => (entry.category || 'sports') === cat);
          categoryScores.sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0));
          const topScores = categoryScores.slice(0, 10);

          if (topScores.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="color: #aaa; padding: 20px; text-align: center;">No local scores yet!</td></tr>`;
            return;
          }

          tbody.innerHTML = "";
          topScores.forEach((entry, index) => {
              const row = document.createElement("tr");
              const safeUsername = (entry.username || "Anonymous").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
              row.innerHTML = `
                  <td><strong>#${index + 1}</strong></td>
                  <td>${safeUsername} (Local)</td>
                  <td style="color: gold; font-weight: bold;">${Number(entry.score) || 0}</td>
              `;
              tbody.appendChild(row);
          });
      }

      document.addEventListener("click", function() {
          if (window.parent && window.parent.postMessage) {
              window.parent.postMessage("play_music", "*");
          }
      });
    </script>
  </body>
</html>
