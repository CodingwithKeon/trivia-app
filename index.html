<!DOCTYPE html>
<html lang="en">
  <link rel="preload" as="image" href="wallpapers/sportstheme_upscayl_5x_high-fidelity-4x.jpg">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Trivia Game</title>
    <link rel="stylesheet" href="designgame.css">
    
  </head>
  <body>
    <script>
      if (window.self === window.top) {
          window.location.href = "soundtrack.html";
      }
    </script>

    <img class="imageappearance" src="wallpapers/triviabg_upscayl_5x_high-fidelity-4x.jpg" alt="World of trivia" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;">
    
    <button id="menuMuteBtn" class="menu-mute-btn">🔊</button>

    <h1 class="mainmenu">
      WELCOME TO THE TRIVIA GAME
    </h1>

    <div class="secondarytext">
      <button class="button1" id="button1">
        NEW GAME
      </button>
    </div>
    
    <div class="secondary text2">
      <button class="button2" id="button2">
        LEADERBOARD
      </button>
    </div>

    <div style="position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); z-index: 20; font-family: 'Roboto Slab', serif; font-size: 0.75em; color: rgba(255, 255, 255, 0.75); background: rgba(0, 0, 0, 0.5); padding: 4px 12px; border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 14px; text-shadow: 1px 1px 2px black; pointer-events: none; user-select: none;">
      Powered by <span style="color: gold; font-weight: bold;">Keon</span>
    </div>

    <script src="menu.js"></script>
    <script>
      const menuMuteBtn = document.getElementById("menuMuteBtn");

      function triggerGlobalMusic() {
          if (window.parent && window.parent.postMessage) {
              window.parent.postMessage("play_music", "*");
          }
      }
      document.addEventListener("click", triggerGlobalMusic);

      if (menuMuteBtn) {
        menuMuteBtn.addEventListener("click", function(e) {
            e.stopPropagation(); 
            if (window.parent && window.parent.postMessage) {
                window.parent.postMessage("toggle_music", "*");
            }
        });
      }

      window.addEventListener("message", function(event) {
          if (event.data && event.data.type === "audio_status" && menuMuteBtn) {
              menuMuteBtn.textContent = event.data.muted ? "🔇" : "🔊";
              menuMuteBtn.style.borderColor = event.data.muted ? "gray" : "gold";
              menuMuteBtn.style.color = event.data.muted ? "gray" : "gold";
          }
      });
    </script>
  </body>
</html>
